<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>火车票最优购买方案</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #040b16;
      --bg-accent: radial-gradient(circle at top, rgba(34, 197, 94, 0.16), transparent 28%), radial-gradient(circle at 88% 8%, rgba(56, 189, 248, 0.18), transparent 22%), linear-gradient(180deg, #06101d 0%, #040b16 100%);
      --panel: rgba(7, 18, 34, 0.92);
      --panel-soft: rgba(12, 24, 42, 0.88);
      --panel-border: rgba(148, 163, 184, 0.16);
      --text: #eff6ff;
      --muted: #9db0c8;
      --primary: #22c55e;
      --primary-strong: #16a34a;
      --secondary: #38bdf8;
      --danger: #fb7185;
      --warning: #facc15;
      --shadow: 0 24px 48px rgba(2, 6, 23, 0.36);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      max-width: 100%;
      overflow-x: hidden;
      background: #02060d;
    }

    body {
      margin: 0;
      max-width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-accent);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.24), transparent 88%);
    }

    body.sheet-open {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: calc(14px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
      display: grid;
      gap: 16px;
    }

    .page,
    .page > *,
    .results-shell,
    .results-shell > *,
    #results,
    #results > *,
    .section-stack,
    .section-stack > *,
    .results-list,
    .results-list > *,
    .recommendations-grid,
    .recommendations-grid > *,
    .result-card,
    .recommendation-card,
    .recommendation-toggle,
    .card-header,
    .metric-row,
    .metric,
    .summary-strip,
    .summary-pill,
    .segments,
    .segment,
    .segment > *,
    .recommendation-meta,
    .recommendation-route,
    .recommendation-trains,
    .recommendation-train,
    .sheet-current,
    .sheet-option,
    .sheet-station {
      min-width: 0;
      max-width: 100%;
    }

    .result-title,
    .result-subtitle,
    .summary-pill,
    .segment-train strong,
    .segment-train span,
    .segment-meta,
    .recommendation-card h3,
    .recommendation-card p,
    .recommendation-meta span,
    .recommendation-route,
    .recommendation-train strong,
    .recommendation-train span,
    .selected-station-hint,
    .sheet-current,
    .sheet-option span,
    .sheet-station span {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .hero-card,
    .search-card,
    .result-card,
    .empty-card,
    .sheet-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 24px 20px 20px;
      border-radius: var(--radius-xl);
      display: grid;
      gap: 14px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -38px;
      top: -48px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.24), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      color: #bbf7d0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: 14px;
    }

    .hero-stats {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }

    .hero-stats::-webkit-scrollbar {
      display: none;
    }

    .stat {
      min-width: 148px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.12);
      scroll-snap-align: start;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .search-card {
      border-radius: var(--radius-xl);
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .search-header {
      display: grid;
      gap: 8px;
    }

    .search-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .search-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 8px;
      color: #dbeafe;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      outline: none;
      font-size: 16px;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    input[readonly] {
      cursor: pointer;
      caret-color: transparent;
    }

    input:focus {
      border-color: rgba(56, 189, 248, 0.8);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
      transform: translateY(-1px);
    }

    .station-field {
      display: grid;
      gap: 8px;
    }

    .station-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .selected-station-hint {
      min-height: 18px;
      color: #bbf7d0;
      font-size: 12px;
      font-weight: 700;
    }

    .swap-row {
      display: flex;
      justify-content: center;
      margin: -2px 0 2px;
    }

    .swap-button,
    .sheet-close,
    .sheet-back {
      border: none;
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      cursor: pointer;
    }

    .swap-button {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 14px 32px rgba(2, 6, 23, 0.25);
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 999px;
      padding: 15px 18px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #04111f;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(34, 197, 94, 0.26);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .primary-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(56, 189, 248, 0.24);
    }

    .primary-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .tips {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.1);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .tips strong {
      color: #d1fae5;
      font-size: 14px;
    }

    .results-shell {
      display: grid;
      gap: 14px;
    }

    .results-head {
      display: grid;
      gap: 6px;
    }

    .results-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .results-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    #results,
    .results-list,
    .section-stack,
    .recommendations-grid {
      display: grid;
      gap: 12px;
    }

    .result-card,
    .empty-card,
    .recommendation-card {
      border-radius: var(--radius-xl);
    }

    .result-card,
    .recommendation-card {
      padding: 18px;
    }

    .card-header {
      display: grid;
      gap: 10px;
    }

    .badge {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(56, 189, 248, 0.14);
      color: #bfdbfe;
    }

    .result-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .result-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      padding: 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .metric span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      font-size: 19px;
      color: #f8fafc;
      line-height: 1.3;
    }

    .summary-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .summary-pill {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.1);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }

    .segments {
      display: grid;
      gap: 10px;
    }

    .segment {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 16px 14px 16px 18px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.56);
      border: 1px solid rgba(148, 163, 184, 0.1);
      overflow: hidden;
    }

    .segment::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 22px;
      bottom: 22px;
      width: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.65), rgba(56, 189, 248, 0.2));
    }

    .segment-index {
      position: absolute;
      left: 0;
      top: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.24), rgba(56, 189, 248, 0.22));
      color: #dcfce7;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(3, 7, 18, 0.22);
    }

    .segment-train,
    .segment-meta {
      padding-left: 24px;
    }

    .segment-train strong {
      display: block;
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .segment-train span,
    .segment-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .segment-meta {
      display: grid;
      gap: 4px;
    }

    .recommendation-card {
      display: grid;
      gap: 12px;
      background: rgba(9, 20, 38, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .recommendation-toggle {
      width: 100%;
      border: none;
      background: transparent;
      color: inherit;
      padding: 0;
      display: grid;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }

    .recommendation-toggle[aria-expanded="true"] .recommendation-expand-hint {
      color: #bbf7d0;
    }

    .recommendation-candidates {
      display: grid;
      gap: 12px;
      padding-top: 4px;
    }

    .recommendation-expand-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .secondary-button {
      width: 100%;
      min-height: 48px;
      border-radius: 18px;
      border: 1px solid rgba(56, 189, 248, 0.28);
      background: rgba(14, 116, 144, 0.16);
      color: #dbeafe;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .failed-candidate-card {
      border-color: rgba(250, 204, 21, 0.32);
      background: linear-gradient(180deg, rgba(120, 53, 15, 0.18), rgba(8, 18, 35, 0.78));
    }

    .recommendation-card h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .recommendation-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .recommendation-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recommendation-meta span,
    .recommendation-route {
      padding: 8px 10px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.08);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
    }

    .recommendation-route {
      font-weight: 600;
      color: var(--muted);
    }

    .recommendation-trains {
      display: grid;
      gap: 8px;
    }

    .recommendation-train {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .recommendation-train strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .recommendation-train span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .empty-card {
      padding: 24px 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .error-card {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
    }

    .error-badge {
      background: rgba(251, 113, 133, 0.14);
      color: #fecdd3;
    }

    .error-title {
      margin: 0;
      font-size: 22px;
      color: #f8fafc;
      line-height: 1.3;
    }

    .error-message {
      margin: 0;
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.7;
    }

    .error-hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .error-validation {
      border-color: rgba(250, 204, 21, 0.28);
      background: linear-gradient(180deg, rgba(120, 53, 15, 0.18), rgba(8, 18, 35, 0.78));
    }

    .error-validation .error-badge {
      background: rgba(250, 204, 21, 0.14);
      color: #fde68a;
    }

    .error-upstream {
      border-color: rgba(248, 113, 113, 0.24);
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.18), rgba(8, 18, 35, 0.78));
    }

    .error-network {
      border-color: rgba(56, 189, 248, 0.24);
      background: linear-gradient(180deg, rgba(12, 74, 110, 0.18), rgba(8, 18, 35, 0.78));
    }

    .error-network .error-badge {
      background: rgba(56, 189, 248, 0.14);
      color: #bae6fd;
    }

    .error-generic {
      border-color: rgba(148, 163, 184, 0.2);
    }

    .loading {
      position: relative;
      overflow: hidden;
    }

    .loading::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.4s infinite;
    }

    .sheet-backdrop[hidden] {
      display: none;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
      background: rgba(3, 8, 20, 0.6);
      backdrop-filter: blur(8px);
    }

    .sheet-panel {
      width: min(100%, 430px);
      max-height: min(80vh, 720px);
      border-radius: 28px 28px 24px 24px;
      padding: 12px 16px 16px;
      display: grid;
      gap: 14px;
      overflow: hidden;
    }

    .sheet-handle {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      margin: 0 auto;
      background: rgba(148, 163, 184, 0.38);
    }

    .sheet-header {
      display: grid;
      gap: 12px;
    }

    .sheet-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .sheet-close,
    .sheet-back {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .sheet-header-copy {
      display: grid;
      gap: 6px;
    }

    .sheet-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sheet-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .sheet-search {
      display: grid;
      gap: 8px;
    }

    .sheet-search span {
      color: #dbeafe;
      font-size: 13px;
      font-weight: 700;
    }

    .sheet-current {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.1);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.6;
    }

    .sheet-list {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 4px;
    }

    .sheet-option,
    .sheet-station,
    .sheet-empty {
      width: 100%;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: var(--text);
      text-align: left;
    }

    .sheet-option,
    .sheet-station {
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      gap: 5px;
    }

    .sheet-option strong,
    .sheet-station strong {
      font-size: 15px;
      line-height: 1.45;
    }

    .sheet-option span,
    .sheet-station span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .sheet-empty {
      padding: 18px;
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    @media (min-width: 431px) {
      .page {
        padding-left: 20px;
        padding-right: 20px;
      }

      .sheet-backdrop {
        align-items: center;
      }

      .sheet-panel {
        border-radius: 30px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <span class="eyebrow">智能购票引擎</span>
      <h1>把复杂购票判断，压成一条更适合手机查看的推荐结果。</h1>
      <p class="hero-copy">输入日期和区间后，系统会快速比较直达、买长坐短、拆段购票和换乘方案，先把最值得优先尝试的路径推到你眼前。</p>
      <div class="hero-stats">
        <div class="stat">
          <strong>4 种</strong>
          <span>方案策略统一排序</span>
        </div>
        <div class="stat">
          <strong>更快</strong>
          <span>重复查询命中本地缓存</span>
        </div>
        <div class="stat">
          <strong>更清晰</strong>
          <span>按车次和区间逐段解释</span>
        </div>
      </div>
    </section>

    <section class="search-card">
      <div class="search-header">
        <h2>立即查询</h2>
        <p>面向手机端重新整理了表单与结果层级，让你先完成输入，再快速判断该怎么买。</p>
      </div>
      <form id="search-form">
        <label>
          出发日期
          <input type="date" name="travel_date" required>
        </label>
        <label class="station-field" data-city-field data-field-label="出发城市" data-sheet-title="选择出发城市">
          出发城市
          <input type="hidden" name="departure_station" data-station-value required>
          <input type="text" placeholder="点击选择出发城市" autocomplete="off" data-city-input="departure_station" required readonly inputmode="none" aria-haspopup="dialog">
          <span class="station-hint">先选城市，再确认具体车站</span>
          <div class="selected-station-hint" data-selected-station></div>
        </label>
        <div class="swap-row">
          <button type="button" class="swap-button" data-swap-stations aria-label="交换出发与到达站点">⇅</button>
        </div>
        <label class="station-field" data-city-field data-field-label="到达城市" data-sheet-title="选择到达城市">
          到达城市
          <input type="hidden" name="arrival_station" data-station-value required>
          <input type="text" placeholder="点击选择到达城市" autocomplete="off" data-city-input="arrival_station" required readonly inputmode="none" aria-haspopup="dialog">
          <span class="station-hint">先选城市，再确认具体车站</span>
          <div class="selected-station-hint" data-selected-station></div>
        </label>
        <button type="submit" class="primary-button">查询最优方案</button>
      </form>
      <div class="tips">
        <strong>筛选逻辑</strong>
        <span>默认先比总耗时，再比总票价，最后尽量减少购票与乘坐复杂度。</span>
      </div>
    </section>

    <section class="results-shell">
      <div class="results-head">
        <div>
          <h2>推荐结果</h2>
          <p>会先给出多维度推荐，再展示完整候选方案，便于在手机上快速对比。</p>
        </div>
      </div>
      <div id="results" aria-live="polite"></div>
    </section>
  </main>

  <div class="sheet-backdrop" data-station-sheet hidden>
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="station-sheet-title">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-actions">
          <button type="button" class="sheet-back" data-sheet-back hidden>返回城市列表</button>
          <button type="button" class="sheet-close" data-sheet-close>关闭</button>
        </div>
        <div class="sheet-header-copy">
          <span class="eyebrow">智能购票引擎</span>
          <h3 class="sheet-title" id="station-sheet-title" data-sheet-title>选择城市</h3>
          <p class="sheet-subtitle" data-sheet-subtitle>先搜索城市，再确认具体车站</p>
        </div>
      </div>
      <label class="sheet-search">
        <span>搜索城市</span>
        <input type="search" data-sheet-search placeholder="搜索城市或拼音" autocomplete="off">
      </label>
      <div class="sheet-current" data-sheet-current hidden></div>
      <div class="sheet-list" data-sheet-list></div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
